name: Daily Game Design Job Search

on:
  schedule:
    # Runs every day at 8:00 AM Pacific Time (15:00 UTC)
    - cron: "0 15 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  issues: write
  contents: read

jobs:
  search-jobs:
    runs-on: ubuntu-latest
    env:
      ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      REPORT_PATH:    job_report.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run job search
        run: python scripts/job_search.py

      - name: Get today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Ensure job-search label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'job-search',
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'job-search',
                color: '0075ca',
                description: 'Daily automated game design job search results',
              });
              console.log('Created job-search label');
            }

      - name: Close previous daily job search issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'job-search',
              state:  'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state:        'closed',
              });
              console.log(`Closed old issue #${issue.number}`);
            }

      - name: Read report content
        id: report
        run: |
          {
            echo 'body<<REPORT_EOF'
            cat job_report.md
            echo 'REPORT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub issue with job listings
        uses: actions/github-script@v7
        with:
          script: |
            const body  = `${{ steps.report.outputs.body }}`;
            const today = `${{ steps.date.outputs.today }}`;
            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🎮 Game Design Jobs — ${today}`,
              body:   body,
              labels: ['job-search'],
            });
            console.log('Job search issue created successfully!');
